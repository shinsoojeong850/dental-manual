* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {

/* ── 상단 고정 영역 ── */
.sticky-top {
  position: sticky;
  top: 0;

}

/* ── 헤더 ── */
header {
  background: linear-gradient(135deg, #1e40af, #2563eb);

}

header p  { font-size: 11px; opacity: 0.8; margin-top: 2px; }

/* ── 검색창 ── */
#search-wrap {
  background: #1e40af;
  padding: 0 14px 12px;
}
#search {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 12px 16px 12px 40px;
  font-size: 15px;
  outline: none;
  background: white;
  color: #1e293b;
}
.search-box { position: relative; }
.search-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
}
#clear-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: #94a3b8;
  color: white;
  border: none;
  border-radius: 50%;
  width: 20px; height: 20px;
  font-size: 12px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}

/* ── 탭 ── */
#tabs {
  display: flex;
  overflow-x: auto;
  background: white;
  border-bottom: 2px solid #e2e8f0;
  scrollbar-width: none;
}
#tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 13px 16px;
  font-size: 14px;
  font-weight: 600;
  color: #64748b;
  cursor: pointer;
  touch-action: manipulation;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  user-select: none;
}
.tab.active { color: #2563eb; border-bottom-color: #2563eb; }

/* ── 콘텐츠 영역 ── */
#content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 60px;
}
#no-result {
  display: none;
  min-height: 50vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: #94a3b8;
}
#no-result .icon { font-size: 40px; }

/* ── 카드 ── */
.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  min-height: 64px;
  -webkit-user-select: none;
}
.card-title { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.card-emoji { font-size: 22px; flex-shrink: 0; }
.card-name { font-size: 15px; font-weight: 700; color: #1e293b; }
.card-sub  { font-size: 12px; color: #64748b; margin-top: 1px; }
.card-arrow {
  font-size: 11px;
  color: #94a3b8;
  transition: transform .2s;
  flex-shrink: 0;
  margin-left: 8px;
}
.card.open .card-arrow { transform: rotate(180deg); }

.card-body {
  display: none;
  border-top: 1px solid #f1f5f9;
}
.card.open .card-body { display: block; }

/* ── 섹션 ── */
.section {
  padding: 12px 16px;
  border-bottom: 1px solid #f1f5f9;
}
.section:last-child { border-bottom: none; }
.sec-title {
  font-size: 11px;
  font-weight: 700;
  color: #2563eb;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 6px;

.sec-content {
  font-size: 13px;
  color: #334155;
  line-height: 1.7;
  white-space: pre-wrap;
}
.sec-img {
  width: 100%;
  max-width: 480px;
  border-radius: 8px;
  margin: 6px 0;

let currentTab = 'all';
let currentSearch = '';

function renderSection(s, q) {
  let html = '<div class="section">';
  html += `<div class="sec-title">${escHtml(s.title)}</div>`;
  if (s.images && s.images.length > 0) {
    s.images.forEach(img => {
      html += `<img src="./images/${img}" class="sec-img" loading="lazy" onerror="this.style.display='none'">`;
    });
  }
  if (s.content) {
    const text = hl(s.content, q);
    if (s.tip) {
      html += `<div class="tip-box"><div class="sec-content">${text}</div></div>`;
    } else {
      html += `<div class="sec-content">${text}</div>`;
    }
  }
  html += '</div>';
  return html;
}

function renderAll() {
  const content = document.getElementById('content');
  const noResult = document.getElementById('no-result');
  const q = currentSearch.toLowerCase().trim();

  let items = DATA;

  if (currentTab !== 'all') {
    items = items.filter(d => d.cat === currentTab);
  }

  if (q) {
    items = items.filter(d => {
      const hay = [d.name, d.sub, ...d.keywords, ...d.sections.map(s => s.title + (s.content || ''))].join(' ').toLowerCase();
      return q.split(' ').every(w => hay.includes(w));
    });
  }

  if (items.length === 0) {
    content.innerHTML = '';
    noResult.style.display = 'flex';
    return;
  }
  noResult.style.display = 'none';
  noResult.style.flexDirection = '';

  const forceOpen = q.length > 0;

  content.innerHTML = items.map(d => `
    <div class="card ${forceOpen ? 'open' : ''}" id="card-${d.id}">
      <div class="card-header" data-card="${d.id}">
        <div class="card-title">
          <span class="card-emoji">${d.emoji}</span>
          <div>
            <div class="card-name">${hl(d.name, q)}</div>
            <div class="card-sub">${escHtml(d.sub)}</div>
          </div>
        </div>
        <span class="card-arrow">▼</span>
      </div>
      <div class="card-body">
        ${d.sections.map(s => renderSection(s, q)).join('')}
      </div>
    </div>
  `).join('');
}

function hl(text, q) {
  if (!q) return escHtml(text);
  let result = escHtml(text);
  q.split(' ').filter(Boolean).forEach(w => {
    const re = new RegExp(escRe(w), 'gi');
    result = result.replace(re, m => `<mark>${m}</mark>`);
  });
  return result;
}
function escHtml(t) {
  if (!t) return '';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

function toggle(id) {
  const card = document.getElementById('card-' + id);
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) {
    setTimeout(() => {
      const top = card.getBoundingClientRect().top + window.scrollY - 80;
      window.scrollTo({ top, behavior: 'smooth' });
    }, 60);
  }
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
  document.getElementById('content').scrollTop = 0;
}

function onSearch() {
  const val = document.getElementById('search').value;
  currentSearch = val;
  document.getElementById('clear-btn').style.display = val ? 'flex' : 'none';
  renderAll();
}

function clearSearch() {
  document.getElementById('search').value = '';
  currentSearch = '';
  document.getElementById('clear-btn').style.display = 'none';
  renderAll();
}

renderAll();

// 모바일 웹뷰 터치 이벤트 위임 (카카오톡 인앱 브라우저 호환)
function handleInteraction(e) {
  const tab = e.target.closest('[data-tab]');
  if (tab) {
    if (e.type === 'touchend') e.preventDefault();
    setTab(tab.dataset.tab, tab);
    return;
  }
  const header = e.target.closest('[data-card]');
  if (header) {
    if (e.type === 'touchend') e.preventDefault();
    toggle(header.dataset.card);
  }
}
document.addEventListener('touchend', handleInteraction, { passive: false });
document.addEventListener('click', handleInteraction);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

let deferredPrompt = null;
const installBanner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = 'flex';
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBanner.style.display = 'none';
    deferredPrompt = null;
  });
}
document.getElementById('install-close')?.addEventListener('click', () => {
  installBanner.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  installBanner.style.display = 'none';
});
</script>
</body>
